<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FG Operaciones v1.3</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
  margin-bottom: 5px;
}

.version {
  font-size: 12px;
  color: #94a3b8;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: black;
  font-weight: bold;
  font-size: 16px;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: #334155;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.active {
  background: #22c55e;
  color: black;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
  <h1>FG Operaciones</h1>
  <div class="version">v1.3</div>

  <input type="text" id="user" placeholder="Usuario">
  <input type="password" id="pass" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="card">
    <h1 id="nombre"></h1>
    <div class="version">v1.3</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="contenido"></div>

</div>

</div>

<script>

let modo = "";

// LOGIN SIMPLE (después lo hacemos serio)
function login() {
  let user = document.getElementById("user").value;

  if (user === "admin") {
    modo = "admin";
    iniciar("ADMIN");
  } else {
    modo = "tecnico";
    iniciar(user || "TECNICO");
  }
}

function iniciar(nombre) {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("nombre").innerText = nombre;

  if (modo === "admin") {
    cargarTabs(["Cargar", "Resumen"]);
    mostrarCarga();
  } else {
    cargarTabs(["Mi día"]);
    mostrarTecnico();
  }
}

// TABS
function cargarTabs(lista) {
  let html = "";
  lista.forEach((t, i) => {
    html += `<div class="tab ${i==0?"active":""}" onclick="clickTab('${t}', this)">${t}</div>`;
  });
  document.getElementById("tabs").innerHTML = html;
}

function clickTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  if (tab === "Cargar") mostrarCarga();
  if (tab === "Resumen") mostrarResumen();
  if (tab === "Mi día") mostrarTecnico();
}

// ADMIN - CARGA
function mostrarCarga() {
  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <h3>Carga de tareas</h3>

      <input type="date" id="fecha">
      <input type="text" placeholder="Cuadrilla">

      <input type="number" placeholder="Instalaciones">
      <input type="number" placeholder="Reparaciones">
      <input type="number" placeholder="Cortes">

      <button onclick="guardar()">Guardar</button>
    </div>
  `;
}

// ADMIN - RESUMEN
function mostrarResumen() {
  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <h3>Resumen</h3>
      <p>Próximamente KPIs reales</p>
    </div>
  `;
}

// TECNICO
function mostrarTecnico() {
  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <h3>Mi día</h3>
      <p>No tenés tareas cargadas todavía</p>
    </div>
  `;
}

// GUARDAR (demo)
function guardar() {
  alert("Guardado (después lo conectamos de verdad)");
}

</script>

</body>
</html>
